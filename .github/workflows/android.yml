name: Android APK

on:
  # Manual "Run workflow" button — use this to get an APK on demand.
  workflow_dispatch:
  # Tagging a version publishes the APK to a GitHub Release.
  push:
    tags: ['v*']

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

# Creating the release needs write access; the default token may be read-only.
permissions:
  contents: write

jobs:
  apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    # Capacitor lives in the frontend workspace; the install still happens at
    # the repo root, which is why that one step overrides this.
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # setup-java's `cache: gradle` can't be used here: it looks for gradle
      # files at checkout time, but android/ doesn't exist until `cap add`
      # scaffolds it further down. Cache the gradle home directly instead.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Export the web bundle
        run: npm run build
        env:
          # The APK talks to the deployed API; without this the leaderboard and
          # sign-in are simply hidden.
          NEXT_PUBLIC_API_URL: ${{ vars.API_URL }}

      - name: Scaffold the Android project
        run: npx cap add android

      # Launcher icon, round icon, adaptive icon and splash screens, all derived
      # from assets/ — android/ is regenerated each run, so this must be too.
      - name: Generate the app icon and splash screens
        run: npx @capacitor/assets generate --android

      # Registers the flappydusk:// scheme so Google sign-in can hand the token
      # back to the app. android/ isn't committed, so this re-applies each run.
      - name: Register the deep-link scheme
        run: node scripts/android-deeplink.mjs

      - name: Copy the bundle into the project
        run: npx cap sync android

      - name: Build the APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: frontend/android

      - name: Rename the APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk flappy-dusk.apk

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: flappy-dusk-apk
          path: frontend/flappy-dusk.apk
          if-no-files-found: error

      - name: Attach the APK to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/flappy-dusk.apk
          body: |
            Download `flappy-dusk.apk` below and install it on your Android device.

            This is a **debug-signed** build, so Android will ask you to allow
            installs from unknown sources the first time. If you already have an
            older build installed, uninstall it first — each CI run signs with a
            fresh debug key, so Android refuses it as an upgrade.
