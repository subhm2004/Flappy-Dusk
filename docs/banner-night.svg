<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Flappy Dusk — a cozy 3D flappy adventure, at night">
  <defs>
    <!-- the same palette the game paints at night -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1030"/>
      <stop offset="45%" stop-color="#1E1A46"/>
      <stop offset="78%" stop-color="#372A5E"/>
      <stop offset="100%" stop-color="#5A4478"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B8768"/>
      <stop offset="100%" stop-color="#83705A"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDF2"/>
      <stop offset="100%" stop-color="#F3F1E2"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F3F1E2" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#F3F1E2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coin" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="100%" stop-color="#FFB545"/>
    </radialGradient>
    <clipPath id="frame"><rect x="0" y="0" width="1200" height="340" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="340" fill="url(#sky)"/>

    <!-- stars, thinning out toward the horizon -->
    <g fill="#FFFFFF">
      <circle cx="90" cy="40" r="1.6" opacity="0.9"/><circle cx="215" cy="88" r="1.2" opacity="0.6"/>
      <circle cx="345" cy="34" r="1.5" opacity="0.8"/><circle cx="430" cy="105" r="1" opacity="0.45"/>
      <circle cx="512" cy="52" r="1.7" opacity="0.9"/><circle cx="605" cy="28" r="1.1" opacity="0.6"/>
      <circle cx="690" cy="120" r="1" opacity="0.4"/><circle cx="815" cy="44" r="1.6" opacity="0.85"/>
      <circle cx="880" cy="98" r="1.2" opacity="0.55"/><circle cx="965" cy="30" r="1.4" opacity="0.75"/>
      <circle cx="1088" cy="66" r="1.7" opacity="0.9"/><circle cx="1160" cy="120" r="1.1" opacity="0.5"/>
      <circle cx="270" cy="140" r="1" opacity="0.35"/><circle cx="740" cy="70" r="1.3" opacity="0.7"/>
    </g>

    <!-- moon -->
    <circle cx="170" cy="250" r="180" fill="url(#moonGlow)"/>
    <circle cx="170" cy="250" r="105" fill="url(#moon)"/>

    <!-- distant dunes -->
    <ellipse cx="120" cy="300" rx="230" ry="60" fill="#554A7D" opacity="0.75"/>
    <ellipse cx="520" cy="308" rx="270" ry="55" fill="#453B68" opacity="0.8"/>
    <ellipse cx="980" cy="300" rx="250" ry="62" fill="#63578C" opacity="0.7"/>

    <!-- clouds, cooled right down -->
    <g fill="#CFC9E4" opacity="0.75">
      <g transform="translate(300 70)">
        <circle cx="0" cy="0" r="20"/><circle cx="24" cy="6" r="15"/><circle cx="-24" cy="6" r="14"/>
      </g>
      <g transform="translate(760 52)">
        <circle cx="0" cy="0" r="17"/><circle cx="21" cy="5" r="13"/><circle cx="-21" cy="5" r="12"/>
      </g>
      <g transform="translate(1050 96)">
        <circle cx="0" cy="0" r="15"/><circle cx="19" cy="5" r="11"/><circle cx="-19" cy="5" r="10"/>
      </g>
    </g>

    <!-- pipes: they light themselves at night, so they keep their green -->
    <g>
      <rect x="640" y="0" width="52" height="96" fill="#62C88F"/>
      <rect x="632" y="96" width="68" height="18" rx="4" fill="#3FA070"/>
      <rect x="640" y="214" width="52" height="126" fill="#62C88F"/>
      <rect x="632" y="196" width="68" height="18" rx="4" fill="#3FA070"/>

      <rect x="900" y="0" width="52" height="60" fill="#62C88F"/>
      <rect x="892" y="60" width="68" height="18" rx="4" fill="#3FA070"/>
      <rect x="900" y="178" width="52" height="162" fill="#62C88F"/>
      <rect x="892" y="160" width="68" height="18" rx="4" fill="#3FA070"/>
    </g>

    <!-- pickups: coin + blue key -->
    <circle cx="666" cy="155" r="15" fill="url(#coin)"/>
    <g transform="translate(926 119)" fill="#49C8FF">
      <circle cx="0" cy="-9" r="9"/>
      <circle cx="0" cy="-9" r="4" fill="#1E1A46"/>
      <rect x="-3" y="-2" width="6" height="20" rx="1.5"/>
      <rect x="3" y="8" width="7" height="4" rx="1"/>
      <rect x="3" y="15" width="7" height="4" rx="1"/>
    </g>

    <!-- ground -->
    <rect x="0" y="296" width="1200" height="44" fill="url(#sand)"/>
    <g fill="#83705A" opacity="0.8">
      <rect x="40" y="296" width="26" height="44"/><rect x="140" y="296" width="26" height="44"/>
      <rect x="240" y="296" width="26" height="44"/><rect x="340" y="296" width="26" height="44"/>
      <rect x="440" y="296" width="26" height="44"/><rect x="540" y="296" width="26" height="44"/>
      <rect x="740" y="296" width="26" height="44"/><rect x="840" y="296" width="26" height="44"/>
      <rect x="1040" y="296" width="26" height="44"/><rect x="1140" y="296" width="26" height="44"/>
    </g>

    <!-- bird -->
    <g transform="translate(455 168) rotate(-8)">
      <ellipse cx="-24" cy="2" rx="10" ry="7" fill="#E4543F"/>
      <circle cx="0" cy="0" r="24" fill="#FF6F59"/>
      <circle cx="6" cy="7" r="16" fill="#FFE7CC"/>
      <ellipse cx="-4" cy="-4" rx="14" ry="8" fill="#E4543F" transform="rotate(-14)"/>
      <circle cx="10" cy="-8" r="5" fill="#2E2430"/>
      <circle cx="12" cy="-10" r="1.8" fill="#fff"/>
      <path d="M22 -2 L38 2 L22 7 Z" fill="#FFB13D"/>
    </g>

    <!-- title -->
    <g font-family="ui-rounded, 'SF Pro Rounded', 'Segoe UI', system-ui, sans-serif" text-anchor="middle">
      <text x="600" y="152" font-size="76" font-weight="800" fill="#8E2F26" opacity="0.6">Flappy Dusk</text>
      <text x="600" y="148" font-size="76" font-weight="800" fill="#FF6F59">Flappy Dusk</text>
      <text x="600" y="192" font-size="21" font-weight="700" fill="#EFE9FF" opacity="0.95">a cozy 3D flappy adventure</text>
      <text x="600" y="232" font-size="16" font-weight="700" fill="#EFE9FF" opacity="0.75">Next.js · TypeScript · Three.js</text>
    </g>
  </g>
</svg>
